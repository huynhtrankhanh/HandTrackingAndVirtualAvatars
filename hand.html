<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic 3D Hand Tracker & Ventral Stickers</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #2a2a35 0%, #0d0d12 100%);
            font-family: sans-serif;
        }

        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* Draggable PiP Container */
        #pip-window {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            background: #000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }

        #pip-window:active {
            cursor: grabbing;
        }

        /* Mirrored video and skeleton canvas */
        #webcam, #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            pointer-events: none;
        }

        #overlay-canvas {
            z-index: 2;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
            }
        }
    </script>
</head>
<body>

    <div id="loading">Waking up AI & Camera...</div>
    <div id="three-container"></div>
    
    <div id="pip-window">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlay-canvas"></canvas>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from '@mediapipe/tasks-vision';

        // ==========================================
        // 1. DRAGGABLE PiP WINDOW LOGIC
        // ==========================================
        const pipWindow = document.getElementById('pip-window');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        pipWindow.addEventListener('pointerdown', (e) => {
            isDragging = true;
            const rect = pipWindow.getBoundingClientRect();
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            pipWindow.setPointerCapture(e.pointerId);
        });

        pipWindow.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            let newX = e.clientX - dragOffsetX;
            let newY = e.clientY - dragOffsetY;
            newX = Math.max(0, Math.min(newX, window.innerWidth - pipWindow.offsetWidth));
            newY = Math.max(0, Math.min(newY, window.innerHeight - pipWindow.offsetHeight));
            pipWindow.style.left = `${newX}px`;
            pipWindow.style.top = `${newY}px`;
            pipWindow.style.right = 'auto';
        });

        pipWindow.addEventListener('pointerup', (e) => {
            isDragging = false;
            pipWindow.releasePointerCapture(e.pointerId);
        });

        // ==========================================
        // 2. THREE.JS SCENE SETUP
        // ==========================================
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        // Realistic Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffeedd, 2.5);
        mainLight.position.set(10, 10, 15);
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xaaccff, 1.5);
        fillLight.position.set(-10, -5, 10);
        scene.add(fillLight);
        
        const rimLight = new THREE.DirectionalLight(0xffffff, 2);
        rimLight.position.set(0, 10, -10);
        scene.add(rimLight);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 3. REALISTIC FLESHY HAND CONSTRUCTION
        // ==========================================
        // Skin material simulating subsurface scattering and flesh
        const skinMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xdf997e,
            roughness: 0.35,
            metalness: 0.05,
            clearcoat: 0.15, // Slight sweat/oil
            clearcoatRoughness: 0.2,
            transmission: 0.1, // Fake subsurface scattering
            thickness: 1.0
        });

        const joints = [];
        const boneGroups = [];
        const palmWebbings = [];

        // Helper to determine anatomical finger radii
        function getRadius(i) {
            if (i === 0) return 0.8; // Wrist
            if ([1,2,3].includes(i)) return 0.6; // Thumb
            if (i === 4) return 0.5; // Thumb tip
            if ([5,9,13,17].includes(i)) return 0.55; // Knuckles
            if ([6,10,14,18].includes(i)) return 0.5; // Mid joints
            if ([7,11,15,19].includes(i)) return 0.45; // Distal joints
            if ([8,12,16,20].includes(i)) return 0.38; // Finger tips
            return 0.5;
        }

        // Create 21 Spherical Joints
        for (let i = 0; i < 21; i++) {
            const r = getRadius(i);
            const jointMesh = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), skinMaterial);
            scene.add(jointMesh);
            joints.push({ mesh: jointMesh, radius: r });
        }

        const HAND_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4], // Thumb
            [0, 5], [5, 6], [6, 7], [7, 8], // Index
            [5, 9], [9, 10], [10, 11], [11, 12], // Middle
            [9, 13], [13, 14], [14, 15], [15, 16], // Ring
            [13, 17], [17, 18], [18, 19], [19, 20]  // Pinky
        ];

        // Creates a seamless cylinder bone between joints
        function createBone(radius) {
            // Geometry centered, height along Y axis
            const geom = new THREE.CylinderGeometry(radius, radius, 1, 32, 1, true);
            const mesh = new THREE.Mesh(geom, skinMaterial);
            // Group holds orientation, Mesh handles length scaling
            const group = new THREE.Group();
            group.add(mesh);
            scene.add(group);
            return { group, mesh };
        }

        // Create Phalanxes (Bones)
        HAND_CONNECTIONS.forEach(conn => {
            const avgRadius = (getRadius(conn[0]) + getRadius(conn[1])) / 2;
            boneGroups.push(createBone(avgRadius));
        });

        // Create Palm Filler Webbing to make it look solid
        const PALM_CONNECTIONS = [[0,9], [0,13], [5,9], [9,13], [13,17]];
        PALM_CONNECTIONS.forEach(() => {
            palmWebbings.push(createBone(0.5)); // Thick fillers
        });

        // ==========================================
        // 4. VENTRAL STICKERS
        // ==========================================
        function createStickerMaterial(emoji) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 256, 256);
            ctx.font = '200px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 128, 140);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return new THREE.MeshBasicMaterial({ 
                map: texture, 
                transparent: true, 
                depthWrite: false, 
                side: THREE.DoubleSide 
            });
        }

        // The exact connection indices mapping to the distal (tip) bones
        const stickersConfig = {
            3: '🐶',  // Thumb tip bone
            7: '🦁',  // Index tip bone
            11: '🐻', // Middle tip bone
            15: '🐱', // Ring tip bone
            19: '🐯'  // Pinky tip bone
        };

        const stickerSize = 1.3;
        const stickerGeom = new THREE.PlaneGeometry(stickerSize, stickerSize);

        for (const [boneIndex, emoji] of Object.entries(stickersConfig)) {
            const mat = createStickerMaterial(emoji);
            const stickerMesh = new THREE.Mesh(stickerGeom, mat);
            
            const targetBone = boneGroups[boneIndex];
            const boneRadius = (getRadius(HAND_CONNECTIONS[boneIndex][0]) + getRadius(HAND_CONNECTIONS[boneIndex][1])) / 2;
            
            // Offset sticker exactly to the surface on the +Z axis (Ventral face)
            stickerMesh.position.set(0, 0, boneRadius + 0.05);
            
            // Attach sticker to the unscaled bone group so it rotates perfectly
            // but doesn't stretch when the finger bends/lengthens
            targetBone.group.add(stickerMesh);
        }

        // ==========================================
        // 5. MEDIAPIPE & WEBCAM LOGIC
        // ==========================================
        const video = document.getElementById('webcam');
        const overlayCanvas = document.getElementById('overlay-canvas');
        const ctx = overlayCanvas.getContext('2d');
        let handLandmarker;

        async function initMediaPipe() {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });

            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                    document.getElementById('loading').style.display = 'none';
                    predictWebcam();
                });
            });
        }

        // ==========================================
        // 6. 3D MATH & RENDER LOOP
        // ==========================================
        let lastVideoTime = -1;

        function update3DHand(landmarks, handednessStr) {
            const SCALE = 25;

            // 1. Position Joints
            landmarks.forEach((lm, index) => {
                const x = -(lm.x - 0.5) * SCALE;
                const y = -(lm.y - 0.5) * SCALE * (overlayCanvas.height / overlayCanvas.width); // Aspect ratio correction
                const z = -lm.z * SCALE;
                joints[index].mesh.position.set(x, y, z);
            });

            // 2. Calculate Ventral (Palm) Normal Vector
            const p0 = joints[0].mesh.position;
            const p5 = joints[5].mesh.position;
            const p17 = joints[17].mesh.position;

            const v1 = new THREE.Vector3().subVectors(p5, p0);
            const v2 = new THREE.Vector3().subVectors(p17, p0);
            
            // Cross product gives us the perpendicular normal of the palm
            let palmNormal = new THREE.Vector3().crossVectors(v1, v2).normalize();
            
            // Adjust normal based on handedness due to mirroring effect
            // We want Z to always point Ventral (towards the palm surface)
            if (handednessStr === 'Left') {
                palmNormal.negate();
            }

            // 3. Update Bones & Stickers (Aligning locally to the Ventral normal)
            const updateBoneSegment = (startMesh, endMesh, boneData) => {
                const start = startMesh.position;
                const end = endMesh.position;
                const center = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
                const length = start.distanceTo(end);

                // Y-Axis: Direction of the bone
                const dirY = new THREE.Vector3().subVectors(end, start).normalize();
                
                // Z-Axis: Ventral (palm-facing)
                const dirZ = palmNormal.clone();
                
                // X-Axis: Orthogonal to both
                const dirX = new THREE.Vector3().crossVectors(dirY, dirZ).normalize();
                
                // Re-orthogonalize Z to guarantee perfect 90 degree matrix
                dirZ.crossVectors(dirX, dirY).normalize();

                // Apply rotation
                const matrix = new THREE.Matrix4().makeBasis(dirX, dirY, dirZ);
                boneData.group.position.copy(center);
                boneData.group.quaternion.setFromRotationMatrix(matrix);
                
                // Stretch only the inner cylinder mesh, leaving the group scale untouched 
                // so child stickers remain perfectly square and un-distorted.
                boneData.mesh.scale.set(1, length, 1);
            };

            // Update main fingers
            HAND_CONNECTIONS.forEach((conn, index) => {
                updateBoneSegment(joints[conn[0]].mesh, joints[conn[1]].mesh, boneGroups[index]);
            });

            // Update palm webbing
            PALM_CONNECTIONS.forEach((conn, index) => {
                updateBoneSegment(joints[conn[0]].mesh, joints[conn[1]].mesh, palmWebbings[index]);
            });
        }

        function draw2DSkeleton(landmarks) {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-overlayCanvas.width, 0);

            ctx.lineWidth = 3;
            ctx.strokeStyle = "rgba(0, 255, 255, 0.8)";
            HAND_CONNECTIONS.forEach(conn => {
                const start = landmarks[conn[0]];
                const end = landmarks[conn[1]];
                ctx.beginPath();
                ctx.moveTo(start.x * overlayCanvas.width, start.y * overlayCanvas.height);
                ctx.lineTo(end.x * overlayCanvas.width, end.y * overlayCanvas.height);
                ctx.stroke();
            });

            ctx.fillStyle = "#ff0055";
            landmarks.forEach(lm => {
                ctx.beginPath();
                ctx.arc(lm.x * overlayCanvas.width, lm.y * overlayCanvas.height, 4, 0, 2 * Math.PI);
                ctx.fill();
            });
            ctx.restore();
        }

        function setVisibility(visible) {
            scene.children.forEach(child => {
                if (child.type === 'Mesh' || child.type === 'Group') {
                    child.visible = visible;
                }
            });
        }

        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0) {
                    setVisibility(true);
                    const landmarks = results.landmarks[0];
                    const handedness = results.handedness[0][0].categoryName; 
                    
                    update3DHand(landmarks, handedness);
                    draw2DSkeleton(landmarks);
                } else {
                    setVisibility(false);
                    ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        initMediaPipe();
    </script>
</body>
</html>
